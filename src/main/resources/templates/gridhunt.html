<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  th:attr="data-theme=${theme}"
  layout:decorate="~{layout}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gridhunt</title>
    <link rel="stylesheet" th:href="@{/css/colors.css}" />
    <link rel="stylesheet" th:href="@{/css/navbar.css}" />
    <link th:href="@{/css/modal.css}" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/gridhunt.css}" />
    <script th:src="@{/js/gridhunt.js}"></script>
    <script th:src="@{/js/htmx.min.js}"></script>
  </head>
  <header th:replace="~{fragments :: header}"></header>
  <!-- Main Content -->
  <main layout:fragment="content" class="main-container">
    <h1 id="gameName" class="game-title" th:text="${gameName}"></h1>

    <div class="game-area" th:fragment="gameFragment">
      <!-- Hints Panel (Left) -->
      <div class="panel hints-panel" th:if="${gameAvailable}">
        <h3 class="panel-title">Hints</h3>
        <div id="hints-container">
          <div class="hints" th:each="hint : ${hints}">
            <div class="hint-item" th:text="${hint}"></div>
          </div>
        </div>
      </div>

      <!-- Game Field -->
      <div class="game-field-container" th:if="${gameAvailable}">
        <div class="game-field-wrapper">
          <div
            class="grid"
            th:style="'grid-template-columns: repeat(' + ${gameMap.getWidth()} + ', 40px)'"
            th:fragment="gridFragment"
          >
            <!-- https://softwareengineering.stackexchange.com/questions/212808/treating-a-1d-data-structure-as-2d-grid -->
            <div
              class="cell"
              th:each="i : ${#numbers.sequence(0,
                                              gameMap.getHeight() * gameMap.getWidth() - 1)}"
              th:with="x=${i % gameMap.getWidth()},
                                        y=${i / gameMap.getWidth()},
                                        tile=${gameMap.getTile(x, y)}"
              th:classappend="${tile.isExplored()} ? 'visible' : 'hidden'"
            >
              <span
                class="result-text"
                th:text="${tile.renderTile(renderMode)}"
              ></span>
            </div>
          </div>
        </div>
      </div>

      <!-- State -->
      <div class="panel controls-panel" th:if="${gameAvailable}">
        <h3 class="panel-title">Game State</h3>
        <div class="game-state">
          <div class="state-item">
            <span class="state-label">Status</span>
            <span
              id="game-status"
              class="state-value playing"
              th:text="${gameStatus}"
            >
            </span>
          </div>
          <div class="state-item" th:if="${gameAvailable}">
            <span class="state-label">Score</span>
            <span id="score" class="state-value" th:text="${score}"></span>
          </div>
        </div>

        <h3 class="panel-title" th:if="${gameAvailable}">Controls</h3>
        <div th:if="${gameStatus != 'FAILED'}">
          <div class="controls-grid">
            <button
              class="ctrl-btn up"
              hx-get="/gridhunt/move/NORTH"
              hx-target=".game-area"
              hx-swap="outerHTML"
            >
              &#9650;
            </button>
            <button
              class="ctrl-btn left"
              hx-get="/gridhunt/move/WEST"
              hx-target=".game-area"
              hx-swap="outerHTML"
            >
              &#9664;
            </button>
            <button
              class="ctrl-btn down"
              hx-get="/gridhunt/move/SOUTH"
              hx-target=".game-area"
              hx-swap="outerHTML"
            >
              &#9660;
            </button>
            <button
              class="ctrl-btn right"
              hx-get="/gridhunt/move/EAST"
              hx-target=".game-area"
              hx-swap="outerHTML"
            >
              &#9654;
            </button>
          </div>
          <button
            class="toggle-btn"
            hx-get="/gridhunt/toggleView"
            hx-target=".grid"
            hx-swap="outerHTML"
          >
            Toggle visibility
          </button>
        </div>

        <h3 class="panel-title" th:if="${gameAvailable}">Attack</h3>
        <div th:if="${gameStatus != 'FAILED'}" class="controls-grid">
          <button
            class="ctrl-btn up"
            hx-get="/gridhunt/attack/NORTH"
            hx-target=".game-area"
            hx-swap="outerHTML"
          >
            K
          </button>
          <button
            class="ctrl-btn left"
            hx-get="/gridhunt/attack/WEST"
            hx-target=".game-area"
            hx-swap="outerHTML"
          >
            H
          </button>
          <button
            class="ctrl-btn down"
            hx-get="/gridhunt/attack/SOUTH"
            hx-target=".game-area"
            hx-swap="outerHTML"
          >
            J
          </button>
          <button
            class="ctrl-btn right"
            hx-get="/gridhunt/attack/EAST"
            hx-target=".game-area"
            hx-swap="outerHTML"
          >
            L
          </button>
        </div>
      </div>
    </div>

    <button
      id="newGameBtn"
      class="action-btn"
      onclick="document.getElementById('difficultyModal').showModal()"
    >
      New Game
    </button>

    <button
      id="nextLevelBtn"
      th:if="${gameStatus != 'FAILED'}"
      class="action-btn"
      hx-get="/gridhunt/next"
      hx-target=".game-area"
      hx-swap="outerHTML"
    >
      Next level
    </button>

    <!-- <button -->
      <!-- class="action-btn" -->
      <!-- hx-get="/gridhunt/genbat" -->
      <!-- hx-target=".game-area" -->
      <!-- hx-swap="outerHTML" -->
    <!-- > -->
      <!-- Generate bat -->
    <!-- </button> -->

    <!-- <a -->
      <!-- id="saveGameBtn" -->
      <!-- class="action-btn" -->
      <!-- th:href="@{/gridhunt/save}" -->
    <!-- > -->
      <!-- Save -->
    <!-- </a> -->

    <!-- <a -->
      <!-- id="loadGameBtn" -->
      <!-- class="action-btn" -->
      <!-- th:href="@{/gridhunt/load}" -->
    <!-- > -->
      <!-- Load -->
    <!-- </a> -->

  </main>

  <input id="loggedPlayer" th:value="${session.username}" hidden></input>

  <footer th:replace="~{fragments :: footer}"></footer>

  <div th:replace="~{fragments :: themeModal}"></div>

  <!-- game lost modal -->
  <dialog id="gameLostModal" class="modal">
    <div class="modal-content">
      <h2>Game lost</h2>
      <div class="difficulty-options">
        <button
          class="difficulty-btn easy"
          onclick="
            document.getElementById('gameLostModal').close();
            document.getElementById('difficultyModal').showModal();
          "
        >
          Replay
        </button>
        <a
          class="difficulty-btn hard"
          th:href="@{/gridhunt/reset}"
          th:style="'text-decoration: none'"
          onclick="document.getElementById('gameLostModal').close()"
        >
          Exit
        </a>
      </div>
      <button
        class="cancel-btn"
        onclick="document.getElementById('gameLostModal').close()"
      >
        Cancel
      </button>
    </div>
  </dialog>

  <!-- difficulty selection modal -->
  <dialog id="difficultyModal" class="modal">
    <div class="modal-content">
      <h2>Select Difficulty</h2>
      <div class="difficulty-options" th:each="diff : ${diffs}">
        <button
          class="difficulty-btn"
          hx-target=".game-area"
          hx-swap="outerHTML"
          th:text="${diff.toString()}"
          th:hx-get="'/gridhunt/new/' + ${diff}"
          onclick="document.getElementById('difficultyModal').close()"
          th:classappend="${diff.toString().toLowerCase()}"
        ></button>
      </div>
      <button
        class="cancel-btn"
        onclick="document.getElementById('difficultyModal').close()"
      >
        Cancel
      </button>
    </div>
  </dialog>

  <!-- game won modal -->
  <dialog id="gameWonModal" class="modal">
    <div class="modal-content">
      <h2>Congrats you won!</h2>
      <div class="difficulty-options">
        <a
          class="difficulty-btn hard"
          th:href="@{/}"
          th:style="'text-decoration: none'"
          onclick="document.getElementById('gameLostModal').close()"
        >
          Exit
        </a>
          <button
            class="difficulty-btn medium"
            hx-get="/gridhunt/next"
            hx-target=".game-area"
            hx-swap="outerHTML"
            onclick="document.getElementById('gameWonModal').close()"
          >
            Next level
          </button>
      </div>
    </div>
  </dialog>
</html>
