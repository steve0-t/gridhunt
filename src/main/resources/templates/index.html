<!doctype html>
<html
  lang="en"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <!-- prettier-ignore -->
    <meta charset="UTF-8">
    <!-- prettier-ignore -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridhunt</title>
    <!-- prettier-ignore -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- prettier-ignore -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- prettier-ignore -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <!-- prettier-ignore -->
    <link th:href="@{/css/colors.css}" rel="stylesheet">
    <!-- prettier-ignore -->
    <link th:href="@{/css/index.css}" rel="stylesheet">
    <!-- prettier-ignore -->
    <link href="http://www.w3.org/2000/svg">
  </head>
  <body>
    <!-- Animated Grid Background -->
    <div class="grid-background" id="gridBackground">
      <svg id="gridSvg" width="100%" height="100%">
        <defs>
          <pattern
            id="gridPattern"
            width="60"
            height="60"
            patternUnits="userSpaceOnUse"
          >
            <path
              d="M 60 0 L 0 0 0 60"
              fill="none"
              stroke="rgba(255,255,255,0.06)"
              stroke-width="1"
            />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#gridPattern)" />
        <g id="highlightCells"></g>
      </svg>
    </div>

    <!-- Corner Brackets -->
    <svg class="corner-bracket top-left" viewBox="0 0 60 60" fill="none">
      <path
        d="M2 58V2H58"
        stroke="currentColor"
        stroke-width="3"
        stroke-linecap="round"
      />
    </svg>
    <svg class="corner-bracket top-right" viewBox="0 0 60 60" fill="none">
      <path
        d="M58 58V2H2"
        stroke="currentColor"
        stroke-width="3"
        stroke-linecap="round"
      />
    </svg>
    <svg class="corner-bracket bottom-left" viewBox="0 0 60 60" fill="none">
      <path
        d="M2 2V58H58"
        stroke="currentColor"
        stroke-width="3"
        stroke-linecap="round"
      />
    </svg>
    <svg class="corner-bracket bottom-right" viewBox="0 0 60 60" fill="none">
      <path
        d="M58 2V58H2"
        stroke="currentColor"
        stroke-width="3"
        stroke-linecap="round"
      />
    </svg>

    <header>
      <nav></nav>
    </header>

    <!-- Main Content -->
    <main layout:fragment="content" class="main-content">
      <!-- Crosshair SVG -->
      <svg class="crosshair" viewBox="0 0 200 200" fill="none">
        <circle
          cx="100"
          cy="100"
          r="80"
          stroke="currentColor"
          stroke-width="1"
          opacity="0.3"
        />
        <circle
          cx="100"
          cy="100"
          r="50"
          stroke="currentColor"
          stroke-width="1"
          opacity="0.2"
        />
        <line
          x1="100"
          y1="0"
          x2="100"
          y2="40"
          stroke="currentColor"
          stroke-width="2"
          opacity="0.4"
        />
        <line
          x1="100"
          y1="160"
          x2="100"
          y2="200"
          stroke="currentColor"
          stroke-width="2"
          opacity="0.4"
        />
        <line
          x1="0"
          y1="100"
          x2="40"
          y2="100"
          stroke="currentColor"
          stroke-width="2"
          opacity="0.4"
        />
        <line
          x1="160"
          y1="100"
          x2="200"
          y2="100"
          stroke="currentColor"
          stroke-width="2"
          opacity="0.4"
        />
      </svg>

      <div class="hero-content">
        <!-- Morphing Text -->
        <p class="subtitle" id="morphText">Welcome to Gamestudio</p>

        <!-- Main Title -->
        <h1 class="title">
          <span class="title-grid">GRID</span
          ><span class="title-hunt">HUNT</span>
        </h1>

        <!-- Tagline -->
        <p class="tagline">
          Navigate the grid. Find the hidden. Claim victory.
        </p>

        <!-- CTA Button -->
        <svg viewBox="0 0 200 90" id="cta-frame">
          <a th:href="@{/gridhunt}">
            <path
              d="M25 2 L195 2 L175 88 L5 88 Z"
              style="stroke-width: 2"
              fill="transparent"
            />
            <text
              x="100"
              y="45"
              text-anchor="middle"
              dominant-baseline="middle"
            >
              Play Now
            </text>
          </a>
        </svg>

        <nav>
          <ul>
            <li class="nav-btn">
              <svg width="110" height="50">
                <a th:href="@{/login}">
                  <rect
                    width="110"
                    height="50"
                    x="0"
                    y="0"
                    style="stroke-width: 2"
                  />
                  <text
                    x="50%"
                    y="50%"
                    text-anchor="middle"
                    dominant-baseline="middle"
                  >
                    Log in
                  </text>
                </a>
              </svg>
            </li>
            <li class="nav-btn">
              <svg width="110" height="50">
                <a th:href="@{/register}">
                  <rect
                    width="110"
                    height="50"
                    x="0"
                    y="0"
                    style="stroke-width: 2"
                  />
                  <text
                    x="50%"
                    y="50%"
                    text-anchor="middle"
                    dominant-baseline="middle"
                  >
                    Register
                  </text>
                </a>
              </svg>
            </li>
          </ul>
        </nav>
      </div>
    </main>

    <script th:src="@{/js/index.js}"></script>
  </body>
</html>
